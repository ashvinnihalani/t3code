name: Bug report
description: Report broken behavior, regressions, crashes, or reliability issues.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for broken behavior, regressions, crashes, or reliability problems.
        Add only the details that will be useful later.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - apps/web
        - apps/server
        - apps/desktop
        - packages/contracts or packages/shared
        - Build, CI, or release tooling
        - Docs
        - Not sure

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Add a repro if you have one.
      placeholder: |
        1. Start the app with ...
        2. Open ...
        3. Disconnect the network
        4. Reconnect and send another prompt

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The thread should resume normally and accept the new message.

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The composer clears, no new turn starts, and the session stays in a pending state.

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste the most relevant output only. Redact secrets.
      render: shell

  - type: upload
    id: attachments
    attributes:
      label: Screenshots, recordings, or supporting files
      description: Add screenshots, short recordings, or files if useful.
    validations:
      required: false
      description: Add screenshots, short recordings, or files if useful.
      accept: ".png,.jpg,.jpeg,.gif,.webp,.svg,.mp4,.mov,.webm,.log,.txt,.json,.zip"
